version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: panam_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    networks:
      - panam_network
    mem_limit: 1.5gb
    memswap_limit: 1.5gb
    cpus: '1.5'
    restart: unless-stopped

  cassandra:
    image: cassandra:4.0
    container_name: panam_cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_HEAP_NEWSIZE: 256M
      CASSANDRA_HEAP_SIZE: 1024M
      CASSANDRA_CLUSTER_NAME: PanamCluster
      CASSANDRA_DC: DataCenter1
      CASSANDRA_ENDPOINT_SNITCH: SimpleSnitch
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - panam_network
    mem_limit: 3gb
    memswap_limit: 3gb
    cpus: '2'
    restart: unless-stopped

  jupyter:
    image: jupyter/datascience-notebook:latest
    container_name: panam_jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
    networks:
      - panam_network
    mem_limit: 3gb
    memswap_limit: 3gb
    cpus: '2'
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password='' --NotebookApp.ip='0.0.0.0'
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
  cassandra_data:
    driver: local

networks:
  panam_network:
    driver: bridge